name: Update KomaMRI Dependencies

on:
  schedule:
    # Run weekly on Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-deps:
    name: Check and update KomaMRI dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: '~1.10'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Run dependency update script
        id: update
        run: python scripts/update_deps.py > "$RUNNER_TEMP/pr_body.txt"

      - name: Check if updates were found
        id: check
        run: |
          if git diff --quiet src/komamripy/juliapkg.json pyproject.toml 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Extract version from pyproject.toml
        if: steps.check.outputs.changed == 'true'
        id: version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | grep -oP '\d+\.\d+\.\d+')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create pull request
        if: steps.check.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.AUTOMATION_TOKEN }}
          commit-message: 'chore: update KomaMRI dependencies'
          title: '[auto] Bump to version ${{ steps.version.outputs.version }}'
          body-path: ${{ runner.temp }}/pr_body.txt
          branch: update-koma-deps
          delete-branch: true
          labels: 'dependencies'

      - name: Enable auto-merge
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.AUTOMATION_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
