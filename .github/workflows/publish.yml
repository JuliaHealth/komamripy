name: Publish

# Does not pin updated dependencies, full manual release
# Manual release: triggered by pushing a version tag

on:
  push:
    tags:
      - "v*"

jobs:
  pypi:
    name: Publish package to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write   # required for Trusted Publishing
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Build package
        run: uv build

      - name: Check package metadata
        run: uv run --isolated --no-project --with twine python -m twine check dist/*

      - name: Smoke test wheel
        run: |
          uv run --isolated --no-project --with dist/*.whl python - <<'PY'
          import importlib.resources as resources
          import komamripy

          assert (resources.files("komamripy") / "juliapkg.json").is_file()
          assert komamripy.__file__
          PY

      - name: Smoke test source distribution
        run: |
          uv run --isolated --no-project --with dist/*.tar.gz python - <<'PY'
          import importlib.resources as resources
          import komamripy

          assert (resources.files("komamripy") / "juliapkg.json").is_file()
          assert komamripy.__file__
          PY

      - name: Publish package distributions to PyPI
        run: uv publish
