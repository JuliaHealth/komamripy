name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }} - ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.14"]
    env:
      PYTHON_JULIAPKG_PROJECT: ${{ github.workspace }}/.julia_env
      UV_MANAGED_PYTHON: true
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-python: true

      - name: Cache JuliaPkg environment
        uses: actions/cache@v6
        with:
          path: |
            .julia_env
            ~/.julia
          key: juliapkg-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'src/komamripy/juliapkg.json') }}
          restore-keys: |
            juliapkg-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Run tests
        run: uv run pytest tests -v
